name: Build CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for installer (e.g. 6.1.0). Empty = skip.'
        required: false
        type: string
  push:
    branches: [ "master" ]
    tags:
      - 'ATARI800_*_*_*'
  pull_request:

jobs:
  build-amd64:
    name: Build on Linux amd64
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:20.04

    steps:
    - uses: actions/checkout@v7
    - name: install depends
      run: |
        sed -i -E 's/(archive|ports)\.ubuntu\.com/old-releases.ubuntu.com/g' /etc/apt/sources.list
        sed -i '/^deb /s/ main/ main universe/' /etc/apt/sources.list
        apt-get update
        apt-get install -y build-essential autoconf automake libtool \
          libsdl2-dev libmp3lame-dev libreadline-dev libgl1-mesa-dev curl ca-certificates
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure --with-opengl --with-readline --with-mp3=lame --with-video=sdl2 --with-sound=sdl2
    - name: building
      run: make -j4
    - name: Archive Atari800 binary
      uses: actions/upload-artifact@v7
      with:
        name: atari800-linux-amd64
        path: src/atari800

    - name: Build AppImage
      if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          V=${{ inputs.version }}
        else
          V=${GITHUB_REF_NAME#ATARI800_}
          V=${V//_/.}
        fi
        echo "VERSION=$V" >> $GITHUB_ENV

        APPDIR="/tmp/Atari800-${V}.AppDir"
        mkdir -p "$APPDIR/usr/bin" \
                 "$APPDIR/usr/share/applications" \
                 "$APPDIR/usr/share/icons/hicolor/128x128/apps" \
                 "$APPDIR/usr/share/icons/hicolor/scalable/apps"

        cp src/atari800 "$APPDIR/usr/bin/"
        cp debian/atari800.desktop "$APPDIR/usr/share/applications/"
        cp data/atari1.png "$APPDIR/usr/share/icons/hicolor/128x128/apps/atari800.png"
        cp data/atari2.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/atari800.svg"

        ln -s usr/share/applications/atari800.desktop "$APPDIR/"
        ln -s usr/share/icons/hicolor/128x128/apps/atari800.png "$APPDIR/atari800.png"

        echo '#!/bin/sh' > "$APPDIR/AppRun"
        echo 'HERE="$(dirname "$(readlink -f "$0")")"' >> "$APPDIR/AppRun"
        echo 'exec "$HERE/usr/bin/atari800" "$@"' >> "$APPDIR/AppRun"
        chmod +x "$APPDIR/AppRun"

        curl -sL "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" \
          -o /tmp/linuxdeploy
        chmod +x /tmp/linuxdeploy
        APPIMAGE_EXTRACT_AND_RUN=1 /tmp/linuxdeploy --appdir "$APPDIR" --output appimage

        if [ -f "/tmp/Atari800-x86_64.AppImage" ]; then
          mv "/tmp/Atari800-x86_64.AppImage" "Atari800-${V}-x86_64.AppImage"
        else
          curl -sL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o /tmp/appimagetool
          chmod +x /tmp/appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool "$APPDIR" "Atari800-${V}-x86_64.AppImage"
        fi

    - name: Upload AppImage
      if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
      uses: actions/upload-artifact@v7
      with:
        name: atari800-linux-appimage
        path: Atari800-*.AppImage

  build-linux-i386:
    name: Build on Linux i386
    runs-on: ubuntu-24.04
    container:
      image: i386/ubuntu:20.04

    steps:
    - uses: actions/checkout@v7
    - name: install depends
      run: |
        sed -i -E 's/(archive|ports)\.ubuntu\.com/old-releases.ubuntu.com/g' /etc/apt/sources.list
        sed -i '/^deb /s/ main/ main universe/' /etc/apt/sources.list
        apt-get update
        apt-get install -y build-essential autoconf automake libtool \
          libsdl2-dev libmp3lame-dev libreadline-dev curl ca-certificates
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure --with-video=sdl2 --with-sound=sdl2 --with-mp3=lame
    - name: building
      run: make -j$(nproc)
    - name: Build AppImage
      if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          V=${{ inputs.version }}
        else
          V=${GITHUB_REF_NAME#ATARI800_}
          V=${V//_/.}
        fi
        echo "VERSION=$V" >> $GITHUB_ENV

        APPDIR="/tmp/Atari800-${V}.AppDir"
        mkdir -p "$APPDIR/usr/bin" \
                 "$APPDIR/usr/share/applications" \
                 "$APPDIR/usr/share/icons/hicolor/128x128/apps" \
                 "$APPDIR/usr/share/icons/hicolor/scalable/apps"

        cp src/atari800 "$APPDIR/usr/bin/"
        cp debian/atari800.desktop "$APPDIR/usr/share/applications/"
        cp data/atari1.png "$APPDIR/usr/share/icons/hicolor/128x128/apps/atari800.png"
        cp data/atari2.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/atari800.svg"

        ln -s usr/share/applications/atari800.desktop "$APPDIR/"
        ln -s usr/share/icons/hicolor/128x128/apps/atari800.png "$APPDIR/atari800.png"

        echo '#!/bin/sh' > "$APPDIR/AppRun"
        echo 'HERE="$(dirname "$(readlink -f "$0")")"' >> "$APPDIR/AppRun"
        echo 'exec "$HERE/usr/bin/atari800" "$@"' >> "$APPDIR/AppRun"
        chmod +x "$APPDIR/AppRun"

        curl -sL "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-i386.AppImage" \
          -o /tmp/linuxdeploy
        chmod +x /tmp/linuxdeploy
        APPIMAGE_EXTRACT_AND_RUN=1 /tmp/linuxdeploy --appdir "$APPDIR" --output appimage

        APPIMAGE_FILE=$(ls /tmp/Atari800-*.AppImage 2>/dev/null | head -1)
        if [ -n "$APPIMAGE_FILE" ]; then
          mv "$APPIMAGE_FILE" "Atari800-${V}-i386.AppImage"
        else
          curl -sL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-i386.AppImage" \
            -o /tmp/appimagetool
          chmod +x /tmp/appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool "$APPDIR" "Atari800-${V}-i386.AppImage"
        fi

    - name: Upload AppImage
      if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
      uses: actions/upload-artifact@v7
      with:
        name: atari800-linux-i386-appimage
        path: Atari800-*.AppImage

  build-macos:
    name: Build on MacOS M1 (arm64)
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v7
    - name: install depends
      run:  brew install sdl2 automake readline
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure --with-opengl --with-video=sdl2 --with-sound=sdl2
    - name: building
      run: make -j4
    - name: Archive Atari800 binary
      uses: actions/upload-artifact@v7
      with:
       name: atari800-macos-arm64
       path: src/atari800

  build-windows-msys2:
    name: Build on Windows MSYS2
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            autoconf
            automake
            libtool
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-lame

      - name: Run autoreconf
        run: autoreconf -fiv

      - name: Configure project
        run: ./configure --with-video=sdl2 --with-sound=sdl2 --with-mp3=lame

      - name: Build project
        run: make -j$(nproc)

      - name: Verify build
        run: |
          if [ ! -f src/atari800.exe ]; then
            echo "Build failed"
            exit 1
          fi
          echo "Build succeeded"

      - name: Archive plain binary
        uses: actions/upload-artifact@v7
        with:
          name: atari800-windows-msys2
          path: src/atari800.exe

      - name: Stage files and build installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
        shell: msys2 {0}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V=${{ inputs.version }}
          else
            V=${GITHUB_REF_NAME#ATARI800_}
            V=${V//_/.}
          fi
          echo "VERSION=$V" >> $GITHUB_ENV
          mkdir -p pkg/act pkg/doc
          cp src/atari800.exe pkg/
          ldd src/atari800.exe | grep '\/mingw64\/bin\/' | \
            awk '{print $3}' | xargs -I{} cp {} pkg/
          cp README.TXT pkg/
          cp act/*.act pkg/act/
          cp data/atari800.ico pkg/
          cp COPYING pkg/doc/COPYING.txt
          cp DOC/INSTALL pkg/doc/INSTALL.txt
          cp DOC/NEWS pkg/doc/NEWS.txt
          cp DOC/USAGE pkg/doc/USAGE.txt
          makensis -DVERSION=$V -DPLATFORM=win64 atari800.nsi

      - name: Verify installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
        shell: msys2 {0}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V=${{ inputs.version }}
          else
            V=${GITHUB_REF_NAME#ATARI800_}
            V=${V//_/.}
          fi
          test -f atari800-$V-win64.exe && echo "Installer OK: atari800-$V-win64.exe"

      - name: Archive installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
        uses: actions/upload-artifact@v7
        with:
          name: atari800-${{ env.VERSION }}-win64
          path: atari800-*-win64.exe

  build-windows-msys2-32:
    name: Build on Windows MSYS2 (32-bit)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v7

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            git
            base-devel
            mingw-w64-i686-toolchain
            autoconf automake libtool
            mingw-w64-i686-SDL2
            mingw-w64-i686-readline
            mingw-w64-i686-libpng
            mingw-w64-i686-nsis
            mingw-w64-i686-lame

      - name: Run autoreconf
        run: autoreconf -fiv

      - name: Configure project
        run: ./configure --with-video=sdl2 --with-sound=sdl2 --with-mp3=lame

      - name: Build project
        run: make -j$(nproc)

      - name: Verify build
        run: |
          test -f src/atari800.exe && echo "Build succeeded"

      - name: Archive plain binary
        uses: actions/upload-artifact@v7
        with:
          name: atari800-windows-msys2-32
          path: src/atari800.exe

      - name: Stage files and build installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V=${{ inputs.version }}
          else
            V=${GITHUB_REF_NAME#ATARI800_}
            V=${V//_/.}
          fi
          echo "VERSION=$V" >> $GITHUB_ENV
          mkdir -p pkg/act pkg/doc
          cp src/atari800.exe pkg/
          for dll in SDL2.dll libmp3lame-0.dll libpng16-16.dll libreadline8.dll libtermcap-0.dll libwinpthread-1.dll zlib1.dll; do
            find /mingw32/bin -name "$dll" -exec cp {} pkg/ \; 2>/dev/null || true
          done
          find /mingw32/bin -name "libgcc_s_dw2-1.dll" -exec cp {} pkg/ \; 2>/dev/null || true
          cp README.TXT pkg/
          cp act/*.act pkg/act/
          cp data/atari800.ico pkg/
          cp COPYING pkg/doc/COPYING.txt
          cp DOC/INSTALL pkg/doc/INSTALL.txt
          cp DOC/NEWS pkg/doc/NEWS.txt
          cp DOC/USAGE pkg/doc/USAGE.txt
          makensis -DVERSION=$V -DPLATFORM=win32 atari800.nsi

      - name: Verify installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V=${{ inputs.version }}
          else
            V=${GITHUB_REF_NAME#ATARI800_}
            V=${V//_/.}
          fi
          test -f atari800-$V-win32.exe && echo "Installer OK: atari800-$V-win32.exe"

      - name: Archive installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_') || inputs.version != ''
        uses: actions/upload-artifact@v7
        with:
          name: atari800-${{ env.VERSION }}-win32
          path: atari800-*-win32.exe
