name: Build CI

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    tags:
      - 'ATARI800_*_*_*'
  pull_request:

jobs:
  build-amd64:
    name: Build on Linux amd64
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: install depends
      run: sudo apt update && sudo apt install -y libsdl2-dev libmp3lame-dev libreadline-dev
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure --with-opengl --with-readline --with-mp3=lame --with-video=sdl2 --with-sound=sdl2
    - name: building
      run: make -j4
    - name: Archive Atari800 binary
      uses: actions/upload-artifact@v4
      with:
       name: atari800-linux-amd64
       path: src/atari800

  build-macos:
    name: Build on MacOS M1 (arm64)
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
    - name: install depends
      run:  brew install sdl2 automake readline
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure --with-opengl --with-video=sdl2 --with-sound=sdl2
    - name: building
      run: make -j4
    - name: Archive Atari800 binary
      uses: actions/upload-artifact@v4
      with:
       name: atari800-macos-arm64
       path: src/atari800

  build-windows-msys2:
    name: Build on Windows MSYS2
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            autoconf
            automake
            libtool
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-readline
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-nsis

      - name: Run autoreconf
        run: autoreconf -fiv

      - name: Configure project
        run: ./configure --with-video=sdl2 --with-sound=sdl2

      - name: Build project
        run: make -j$(nproc)

      - name: Verify build
        run: |
          if [ ! -f src/atari800.exe ]; then
            echo "Build failed"
            exit 1
          fi
          echo "Build succeeded"

      - name: Archive plain binary
        uses: actions/upload-artifact@v4
        with:
          name: atari800-windows-msys2
          path: src/atari800.exe

      - name: Stage files and build installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_')
        shell: msys2 {0}
        run: |
          V=${GITHUB_REF_NAME#ATARI800_}
          V=${V//_/.}
          mkdir -p pkg/act pkg/doc
          cp src/atari800.exe pkg/
          ldd src/atari800.exe | grep '\/mingw64\/bin\/' | \
            awk '{print $3}' | xargs -I{} cp {} pkg/
          cp README.TXT pkg/
          cp act/*.act pkg/act/
          cp COPYING pkg/doc/COPYING.txt
          cp DOC/INSTALL pkg/doc/INSTALL.txt
          cp DOC/NEWS pkg/doc/NEWS.txt
          cp DOC/USAGE pkg/doc/USAGE.txt
          makensis -DVERSION=$V atari800.nsi

      - name: Verify installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_')
        shell: msys2 {0}
        run: |
          V=${GITHUB_REF_NAME#ATARI800_}
          V=${V//_/.}
          test -f atari800-$V-win64.exe && echo "Installer OK: atari800-$V-win64.exe"

      - name: Archive installer
        if: startsWith(github.ref, 'refs/tags/ATARI800_')
        uses: actions/upload-artifact@v4
        with:
          name: atari800-windows-installer
          path: atari800-*-win64.exe
